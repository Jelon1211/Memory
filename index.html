<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Board</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>What does it mean in Polish?</h1>
      </header>
      <div class="board">
        <div class="card">
          <div class="front">Jump</div>
          <div class="back">Skakać</div>
        </div>
        <div class="card">
          <div class="front">Run</div>
          <div class="back">Biegać</div>
        </div>
        <div class="card">
          <div class="front">Swim</div>
          <div class="back">Skakać</div>
        </div>
        <div class="card">
          <div class="front">Fly</div>
          <div class="back">Latać</div>
        </div>
        <div class="card">
          <div class="front">Sit down</div>
          <div class="back">Siadać</div>
        </div>
        <div class="card">
          <div class="front">Spin around</div>
          <div class="back">Obrocic się</div>
        </div>
        <div class="card">
          <div class="front">Sing</div>
          <div class="back">Spiewać</div>
        </div>
        <div class="card">
          <div class="front">Walk</div>
          <div class="back">Chodzić</div>
        </div>
        <div class="card">
          <div class="front">Climb</div>
          <div class="back">Wspinac się</div>
        </div>
      </div>
    </div>
  </body>
</html>
